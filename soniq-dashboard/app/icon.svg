    />
    <g id="bars" fill="#F8FAFC">
      <rect id="bar-left" x="-28" y="-20" width="12" height="40" rx="6" opacity="0.78" />
      <rect id="bar-center" x="-6" y="-38" width="12" height="76" rx="6" />
      <rect id="bar-right" x="16" y="-14" width="12" height="28" rx="6" opacity="0.78" />
