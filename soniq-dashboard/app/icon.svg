<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="soniq-surface" x1="40" y1="24" x2="224" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="50%" stop-color="#09090B" />
      <stop offset="100%" stop-color="#1E1B4B" />
    </linearGradient>
    <linearGradient id="soniq-brand" x1="72" y1="64" x2="196" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67E8F9" />
      <stop offset="52%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <radialGradient id="soniq-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 128) rotate(90) scale(82)">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3" />
      <stop offset="58%" stop-color="#22D3EE" stop-opacity="0.07" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect id="tile" x="16" y="16" width="224" height="224" rx="56" fill="url(#soniq-surface)" />
  <rect x="16.5" y="16.5" width="223" height="223" rx="55.5" stroke="#A5B4FC" stroke-opacity="0.14" />
  <circle id="halo" cx="128" cy="128" r="78" fill="url(#soniq-glow)" />

  <g id="mark" transform="translate(128 128)">
