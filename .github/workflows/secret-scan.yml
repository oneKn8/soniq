name: Secret Scan

# Fails the build if a credential is committed to the repository. This repo
# previously leaked a LiveKit API key, so secret scanning is a required gate.
# fetch-depth: 0 makes gitleaks scan the full git history, so a secret already
# present in an older commit is caught, not just secrets in the latest diff.

on:
  push:
  pull_request:
  # A manual/scheduled run makes gitleaks-action scan the FULL git history
  # instead of only the pushed/PR commits. This repo previously committed a
  # LiveKit api_key/api_secret (soniq-agent/livekit/sip.yaml) that still lives
  # in older commits, so a periodic history audit surfaces it until the history
  # is purged, while the push/pull_request runs above keep new leaks out.
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Needed for gitleaks to post its findings as a pull request comment.
  pull-requests: write

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required when the repository is owned by a
          # GitHub organization. It is a no-op for personal accounts, so passing
          # an unset secret here is safe and keeps the workflow portable.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
