[pytest]
# asyncio_mode=auto lets plain "async def test_*" run without a per-test marker.
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
# In a clean environment "python -m pytest" just works (pytest-asyncio
# autoloads). If your shell leaks unrelated pytest plugins onto PYTHONPATH
# (e.g. a sourced ROS environment), disable autoload and load the async runner
# explicitly:
#   PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p pytest_asyncio.plugin
addopts = -ra
